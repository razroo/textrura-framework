name: Quality checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Lint
        run: bun run lint

      - name: Fast tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Benchmark MCP form flow
        run: bun run benchmark:mcp-flow:all -- --assert

      - name: Examples smoke
        run: bun run examples:smoke

      - name: Full-stack browser E2E
        run: bun run e2e:demo

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Release readiness gate
        run: bun run release:gate
