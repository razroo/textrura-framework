name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update textura dependency to npm (not file:)
        run: |
          cd packages/core
          npm pkg set "dependencies.textura=^0.1.0"

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: |
          npm run build -w @textura/core
          npm run build -w @textura/renderer-canvas

      - name: Build demo
        run: npx vite build --config demo/vite.config.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
