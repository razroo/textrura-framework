name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify rolldown Linux binding
        run: test -f node_modules/@rolldown/binding-linux-x64-gnu/rolldown-binding.linux-x64-gnu.node

      - name: Build Geometra demo
        run: bun run demo:build

      - name: Build Textura demo
        run: |
          cd packages/textura
          npx vite build --config demo/vite.config.ts --base /geometra/textura/
          cp -r dist-demo ../../dist-demo/textura

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
