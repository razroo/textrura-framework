name: Release to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update textura dependency to npm (not file:)
        run: |
          cd packages/core
          npm pkg set "dependencies.textura=^1.1.1"

      - name: Set version on all packages
        run: |
          for dir in packages/core packages/renderer-canvas packages/renderer-terminal packages/server packages/client; do
            cd "$dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd "$GITHUB_WORKSPACE"
          done

      - name: Update cross-references to release version
        run: |
          for dir in packages/renderer-canvas packages/renderer-terminal packages/server packages/client; do
            cd "$dir"
            npm pkg set "dependencies.@geometra/core=^$VERSION" 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          done

      - name: Install dependencies
        run: bun install

      - name: Build all packages (dependency order)
        run: |
          bun run --filter @geometra/core build
          bun run --filter @geometra/renderer-canvas build
          bun run --filter @geometra/renderer-terminal build
          bun run --filter @geometra/server build
          bun run --filter @geometra/client build

      - name: Publish @geometra/core
        run: npm publish --provenance --access public -w @geometra/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @geometra/renderer-canvas
        run: npm publish --provenance --access public -w @geometra/renderer-canvas
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @geometra/renderer-terminal
        run: npm publish --provenance --access public -w @geometra/renderer-terminal
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @geometra/server
        run: npm publish --provenance --access public -w @geometra/server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @geometra/client
        run: npm publish --provenance --access public -w @geometra/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
