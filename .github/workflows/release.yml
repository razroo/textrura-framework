name: Release to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TEXTURA_VERSION: ^1.1.2
      PUBLISH_DIRS: >-
        packages/core
        packages/renderer-canvas
        packages/renderer-terminal
        packages/renderer-webgpu
        packages/server
        packages/client
        packages/ui
        packages/router
      CORE_DEPENDENT_DIRS: >-
        packages/renderer-canvas
        packages/renderer-terminal
        packages/renderer-webgpu
        packages/server
        packages/client
        packages/ui
        packages/router
      PUBLISH_PACKAGES: >-
        @geometra/core
        @geometra/renderer-canvas
        @geometra/renderer-terminal
        @geometra/renderer-webgpu
        @geometra/server
        @geometra/client
        @geometra/ui
        @geometra/router
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Normalize publish-time dependencies
        run: |
          cd packages/core
          npm pkg set "dependencies.textura=$TEXTURA_VERSION"
          cd "$GITHUB_WORKSPACE"
          for dir in $CORE_DEPENDENT_DIRS; do
            cd "$dir"
            npm pkg set "dependencies.@geometra/core=^$VERSION"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Set version on publishable packages
        run: |
          for dir in $PUBLISH_DIRS; do
            cd "$dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd "$GITHUB_WORKSPACE"
          done

      - name: Install dependencies
        run: bun install

      - name: Build publishable packages
        run: bun run build

      - name: Publish packages
        run: |
          for pkg in $PUBLISH_PACKAGES; do
            npm publish --provenance --access public -w "$pkg"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
