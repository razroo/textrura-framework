<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometra — Full-Stack Dashboard</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      background: #07131f;
      color: #d9e7ff;
      font: 16px/1.5 system-ui, sans-serif;
    }

    a {
      color: #7ec7ff;
    }
  </style>
</head>
<body>
  <p>Redirecting to the fullscreen demo. If nothing happens, open <a href="./">/</a>.</p>
  <script>
    const target = new URL('./', window.location.href)
    target.search = window.location.search
    target.hash = window.location.hash
    window.location.replace(target)
  </script>
</body>
</html>
