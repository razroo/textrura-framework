<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Software Engineer — Apply</title>
    <style>
      /* Inlined here (instead of imported as src/styles.css) so vite never
         enters its CSS pipeline for this fixture. vite v8 ships lightningcss
         as a hard dependency for CSS minify, and lightningcss has separate
         native binaries per platform that bun's lockfile only captures for
         the install host. A CSS import would build clean on macOS but break
         Examples smoke on Linux CI with "Cannot find module
         '../lightningcss.linux-x64-gnu.node'". None of the other workspace
         demos import CSS — keeping this fixture aligned. */

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        background: #f7f8fa;
        color: #1a1f2e;
      }

      main {
        max-width: 720px;
        margin: 40px auto;
        padding: 24px 32px 64px;
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      }

      h1 { font-size: 24px; margin-bottom: 6px; }

      .subtitle {
        color: #5b6478;
        margin-top: 0;
        margin-bottom: 24px;
        font-size: 14px;
      }

      fieldset {
        border: 1px solid #e3e6ed;
        border-radius: 8px;
        padding: 16px 20px 20px;
        margin-bottom: 20px;
      }

      legend {
        font-weight: 600;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #6b7385;
        padding: 0 8px;
      }

      .field { display: block; margin-bottom: 14px; }
      .field:last-child { margin-bottom: 0; }

      .field-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #2d3445;
        margin-bottom: 6px;
      }

      input[type='text'],
      input[type='email'],
      input[type='tel'],
      input[type='url'],
      select,
      textarea {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid #cdd2dc;
        border-radius: 6px;
        font-size: 14px;
        background: #ffffff;
        font-family: inherit;
      }

      textarea { resize: vertical; min-height: 100px; }
      input[type='file'] { font-size: 13px; }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .checkbox-row input[type='checkbox'] { width: 16px; height: 16px; }
      .checkbox-row .field-label { margin-bottom: 0; }

      button[type='submit'] {
        margin-top: 8px;
        padding: 10px 22px;
        background: #2a52be;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button[type='submit']:hover { background: #1f3e9a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
