<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometra — Auth Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b;
      color: #fafafa;
      font-family: Inter, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
      gap: 20px;
    }
    h1 { font-size: 20px; font-weight: 600; color: #a1a1aa; }
    p { font-size: 13px; color: #71717a; max-width: 460px; text-align: center; line-height: 1.5; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      background: #18181b;
      color: #fafafa;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: #27272a; }
    button.active { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.1); }
    button.admin { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.1); }
    button.viewer { border-color: #0ea5e9; color: #0ea5e9; background: rgba(14,165,233,0.1); }
    button.invalid { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1); }
    canvas { border: 1px solid #27272a; border-radius: 8px; }
    #status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #71717a;
      background: #131320;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px 16px;
      max-width: 460px;
      width: 100%;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 4px;
    }
    .tag-ok { background: rgba(34,197,94,0.15); color: #22c55e; }
    .tag-err { background: rgba(239,68,68,0.15); color: #ef4444; }
    .tag-warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
  </style>
</head>
<body>
  <h1>Geometra — Auth Demo</h1>
  <p>
    Server uses <code>onConnection</code> to gate access and <code>onMessage</code>
    to enforce per-role permissions. Same geometry protocol, different privileges.
  </p>

  <div class="controls">
    <button class="admin" onclick="connectAs('admin')">Connect as Admin</button>
    <button class="viewer" onclick="connectAs('viewer')">Connect as Viewer</button>
    <button class="invalid" onclick="connectAs('invalid')">Invalid Token</button>
  </div>

  <canvas id="app" width="460" height="340"></canvas>
  <div id="status">Click a button above to connect.</div>

  <script type="module" src="./client.ts"></script>
</body>
</html>
