<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometra Agent — On-Demand UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 16px;
    }
    h1 { font-size: 20px; font-weight: 600; color: #38bdf8; }
    p { font-size: 13px; color: #64748b; max-width: 700px; text-align: center; line-height: 1.5; }
    canvas { border: 1px solid #1e293b; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Geometra Agent — On-Demand UI</h1>
  <p>This canvas receives server-computed geometry over WebSocket.
     The agent builds UI elements (tables, layouts) on the fly via <code>showUI()</code>
     and streams text via <code>append()</code>. Type in the input and press Enter.</p>
  <canvas id="app" width="800" height="600"></canvas>
  <script type="module" src="./client-visual.ts"></script>
</body>
</html>
